<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'none';
           style-src 'unsafe-inline';
           script-src 'unsafe-inline' 'self';
           connect-src https: http://127.0.0.1:* http://localhost:*;
           img-src 'self' data:">
<title>小哒 Coda · 工作台</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ece7de;
  --card: #fffdf8;
  --ink: #2b2723;
  --accent: #e0623a;
  --accent-soft: #fdeee5;
  --accent-hover: #c95430;
  --muted: #8a8175;
  --muted-strong: #6b6258;
  --border: #e2dacd;
  --border-soft: #ece5d8;
  --pill: #f1ebe0;
  --code-bg: #2b2723;
  --code-fg: #f0eadf;
  --green: #2d7a3a;
  --orange: #c96a10;
  --red: #be2c2c;
  --score-green-bg: #dff0e2;
  --score-green-fg: #1d5c27;
  --score-orange-bg: #fbe7cb;
  --score-orange-fg: #7a3c00;
  --score-red-bg: #fbdada;
  --score-red-fg: #7a0000;
  --shadow: 0 1px 2px rgba(43,39,35,0.04), 0 4px 14px -8px rgba(43,39,35,0.12);
  --radius: 14px;
}

html, body {
  height: 100vh;
  overflow: hidden;
  background: var(--bg);
  color: var(--ink);
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* 统一线性 icon 规格 */
.ic { width: 18px; height: 18px; flex-shrink: 0; stroke: currentColor; stroke-width: 1.7; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.ic-sm { width: 15px; height: 15px; }
.ic-lg { width: 21px; height: 21px; }

.app { display: flex; height: 100vh; }

/* ─────────── 左侧栏 ─────────── */
.sidebar {
  width: 260px;
  flex-shrink: 0;
  height: 100vh;
  background: #f4efe7;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.brand {
  padding: 16px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.brand-logo {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-logo img { width: 100%; height: 100%; object-fit: contain; }
.brand-logo .ic { stroke-width: 1.9; }
.brand-title {
  font-family: Georgia, "Songti SC", "SimSun", serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1.2;
}
.brand-sub { font-size: 10.5px; color: var(--muted); margin-top: 1px; }

.sidebar-scroll { flex: 1; overflow-y: auto; padding: 4px 10px 6px; }

.side-label {
  font-size: 10.5px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 8px 8px 6px;
}

/* 项目操作 */
.proj-actions { display: flex; gap: 6px; padding: 0 4px 8px; }
.btn {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 7px 8px;
  border-radius: 9px;
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s, transform 0.08s, box-shadow 0.15s;
  white-space: nowrap;
}
.btn-pick { background: var(--card); color: var(--accent); border: 1.5px solid var(--accent); }
.btn-pick:hover { background: var(--accent-soft); }
.btn-scan { background: var(--accent); color: #fff; border: none; box-shadow: 0 2px 8px -2px rgba(224,98,58,0.5); }
.btn-scan:hover { background: var(--accent-hover); }
.btn:active { transform: scale(0.97); }

/* 隐藏的输入框（功能保留） */
#root-input-hidden { display: none; }

/* 拖拽区包裹项目列表 */
.dropzone {
  border-radius: 8px;
  transition: border-color 0.15s, background 0.15s;
  margin-bottom: 4px;
}
.dropzone.dragover {
  background: rgba(224,98,58,0.06);
  border: 1.5px dashed var(--accent);
}

.dropzone-hint {
  color: var(--muted);
  font-size: 11.5px;
  text-align: center;
  padding: 10px 6px;
  font-style: italic;
  line-height: 1.5;
}

/* 项目行（分数与名同行右端，路径独占一行不抢位） */
.proj-list { display: flex; flex-direction: column; gap: 3px; }
.proj-list:empty + .dropzone-hint,
.proj-list:not(:empty) ~ .dropzone-hint { display: none; }

.proj-row {
  display: block;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background 0.12s;
}
.proj-row:hover { background: var(--pill); }
.proj-row.active {
  background: var(--accent-soft);
  border-color: #f3d6c5;
  box-shadow: inset 3px 0 0 var(--accent);
}
.proj-line1 { display: flex; align-items: center; gap: 7px; }
.proj-check { color: var(--green); display: flex; flex-shrink: 0; }
.proj-name {
  flex: 1; min-width: 0;
  font-size: 12.5px; font-weight: 600;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.proj-score {
  flex-shrink: 0;
  font-family: Georgia, serif; font-weight: 700; font-size: 13px;
}
.proj-dir {
  font-size: 10px; color: var(--muted);
  font-family: "Menlo", monospace;
  margin-top: 2px; padding-left: 22px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.proj-remove {
  flex-shrink: 0;
  width: 18px; height: 18px;
  border: none; background: transparent;
  color: var(--muted); font-size: 14px;
  cursor: pointer; border-radius: 5px;
  line-height: 1;
  transition: background 0.12s, color 0.12s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.proj-remove:hover { background: #fdd5d5; color: var(--red); }

.spinner {
  width: 12px; height: 12px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 功能菜单（选中态：浅橙底+左条+橙字，不再满橙填充） */
.nav { display: flex; flex-direction: column; gap: 2px; padding: 2px 0 6px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 10px;
  cursor: pointer;
  color: var(--muted-strong);
  transition: background 0.12s, color 0.12s;
}
.nav-item:hover { background: var(--pill); color: var(--ink); }
.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
  box-shadow: inset 3px 0 0 var(--accent);
  font-weight: 700;
}
.nav-item.active .nav-badge { background: var(--accent); color: #fff; }
.nav-ic { display: flex; flex-shrink: 0; }
.nav-label { flex: 1; font-size: 13px; font-weight: 600; }
.nav-item.active .nav-label { font-weight: 700; }
.nav-badge {
  font-size: 11px; font-weight: 700;
  min-width: 20px; text-align: center;
  padding: 1px 7px; border-radius: 999px;
  background: var(--pill); color: var(--muted-strong);
}
.nav-badge:empty { display: none; }

/* 桌宠底栏 */
.pet-foot {
  flex-shrink: 0;
  margin: 0 10px 10px;
  padding: 10px 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #fff7f0, #fdeadd);
  border: 1px solid #f3ddca;
  display: flex; align-items: center; gap: 10px;
}
.pet-avatar {
  width: 38px; height: 38px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pet-avatar img { width: 100%; height: 100%; object-fit: contain; }
.pet-name { font-size: 12px; font-weight: 700; }
.pet-status { font-size: 10.5px; color: var(--green); display: flex; align-items: center; gap: 4px; margin-top: 1px; }
.pet-status::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }

/* 状态栏（全局） */
.status-line {
  font-size: 11.5px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 18px 12px 36px;
  flex-shrink: 0;
  min-height: 28px;
}
.status-line.error { color: var(--red); }
.status-line.success { color: var(--green); }

/* ─────────── 右侧主区 ─────────── */
.main { flex: 1; height: 100vh; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.main-header {
  padding: 20px 28px 14px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--border-soft);
}
.main-title {
  font-family: Georgia, "Songti SC", serif;
  font-size: 21px; font-weight: 700;
  display: flex; align-items: center; gap: 10px;
}
.main-title .mt-ic { color: var(--accent); display: flex; }
.main-desc { font-size: 12px; color: var(--muted); margin-top: 5px; padding-left: 30px; }
.main-body { padding: 20px 28px 40px; flex: 1; }

.panel { display: none; }
.panel.active { display: block; animation: fade 0.25s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

/* 占位 */
.placeholder {
  color: var(--muted);
  font-size: 13px;
  padding: 28px 0;
  text-align: center;
  font-style: italic;
}

/* ── 评分页：均分英雄条 + 问题分布迷你统计 ── */
.score-top { display: grid; grid-template-columns: 1.3fr 1fr; gap: 12px; margin-bottom: 14px; }
.avg-hero {
  display: flex; align-items: center; gap: 16px;
  padding: 20px 22px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.avg-num { font-family: Georgia, serif; font-size: 52px; font-weight: 700; line-height: 1; }
.avg-meta-label { font-size: 14px; font-weight: 700; }
.avg-meta-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
.score-legend { font-size: 11.5px; color: var(--muted); margin-bottom: 10px; }

.dist-card {
  padding: 16px 18px;
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow);
  display: flex; flex-direction: column; justify-content: center;
}
.dist-title { font-size: 11.5px; font-weight: 700; color: var(--muted-strong); margin-bottom: 10px; }
.dist-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.dist-row:last-child { margin-bottom: 0; }
.dist-tag { width: 34px; flex-shrink: 0; color: var(--muted-strong); }
.dist-bar { flex: 1; height: 7px; border-radius: 5px; background: var(--pill); overflow: hidden; }
.dist-fill { height: 100%; border-radius: 5px; }
.dist-n { width: 16px; text-align: right; font-weight: 700; flex-shrink: 0; }

/* 文件评分列表 */
.file-list { display: flex; flex-direction: column; gap: 10px; }
.file-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  overflow: hidden; box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.file-card:hover { box-shadow: 0 2px 4px rgba(43,39,35,0.05), 0 8px 22px -10px rgba(43,39,35,0.2); }
.file-head { display: flex; align-items: center; gap: 10px; padding: 13px 16px; cursor: pointer; user-select: none; }
.file-head:hover { background: var(--pill); }
.file-main { flex: 1; min-width: 0; }
.file-top { display: flex; align-items: center; gap: 9px; }
.file-ic { color: var(--muted); display: flex; flex-shrink: 0; }
.file-nick {
  font-family: Georgia, "Songti SC", serif;
  font-size: 15px; font-weight: 700; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.file-path { font-size: 11px; font-family: "Menlo", monospace; color: var(--muted); margin-top: 3px; padding-left: 23px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-summary {
  display: flex; align-items: center; gap: 7px;
  font-size: 12.5px; margin-top: 10px; margin-left: 23px;
  padding: 6px 10px; border-radius: 8px;
}
.file-summary.high { background: #fdf1f1; color: #8a1414; }
.file-summary.mid  { background: #fff9f0; color: #7a3c00; }
.file-summary.ok   { background: #eef6ef; color: var(--green); }

.score-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 12.5px; font-weight: 700; font-family: Georgia, serif;
  flex-shrink: 0;
}
.score-badge .sb-grade { font-family: -apple-system, "PingFang SC", sans-serif; font-size: 11px; font-weight: 600; opacity: 0.85; }
.score-badge.green { background: var(--score-green-bg); color: var(--score-green-fg); }
.score-badge.orange { background: var(--score-orange-bg); color: var(--score-orange-fg); }
.score-badge.red { background: var(--score-red-bg); color: var(--score-red-fg); }
.chevron { color: var(--muted); display: flex; flex-shrink: 0; transition: transform 0.2s; }
.chevron.open { transform: rotate(90deg); }
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.high { background: var(--red); }
.dot.mid  { background: var(--orange); }
.dot.low  { background: #aaa; }

/* 展开的 issues 列表 */
.file-issues {
  display: none;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-direction: column;
  gap: 10px;
}
.file-issues.open { display: flex; }

.issue-item { padding: 10px 12px; border-radius: 8px; border-left: 3px solid var(--border); background: var(--pill); }
.issue-item.high { border-left-color: var(--red); background: #fff5f5; }
.issue-item.mid  { border-left-color: var(--orange); background: #fff9f0; }
.issue-item.low  { border-left-color: #bbb; background: var(--pill); }
.issue-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 5px; }
.issue-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.issue-dot.high { background: var(--red); }
.issue-dot.mid  { background: var(--orange); }
.issue-dot.low  { background: #aaa; }
.issue-level-tag { flex-shrink: 0; font-size: 10.5px; font-weight: 700; padding: 1px 7px; border-radius: 5px; line-height: 1.5; }
.issue-level-tag.high { background: #fdd5d5; color: #7a0000; }
.issue-level-tag.mid  { background: #fde6c4; color: #7a3c00; }
.issue-level-tag.low  { background: var(--pill); color: var(--muted); }
.issue-problem { font-size: 13px; font-weight: 500; color: var(--ink); flex: 1; }
.issue-fix { font-size: 12.5px; color: var(--muted); padding-left: 16px; line-height: 1.5; }
.issue-fix-label { font-weight: 600; color: var(--ink); margin-right: 4px; }
.issue-tech { font-size: 11.5px; color: var(--muted); padding-left: 16px; margin-top: 5px; line-height: 1.5; font-family: "Menlo", monospace; }

/* 通用 section-card */
.section-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 14px;
}

/* ── 公共模块页 ── */
.reuse-list { display: flex; flex-direction: column; gap: 14px; }
.reuse-item { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
.reuse-head { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: var(--card); }
.reuse-ic { color: var(--accent); display: flex; }
.reuse-name { font-size: 13px; font-weight: 600; flex: 1; }
.reuse-from { font-size: 11.5px; color: var(--muted-strong); background: var(--pill); border: 1px solid var(--border); border-radius: 12px; padding: 2px 9px; }
.copy-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--accent); color: #fff; border: none;
  border-radius: 7px; padding: 4px 11px; font-size: 12px; cursor: pointer; font-weight: 600;
  font-family: inherit;
  transition: background 0.15s;
}
.copy-btn:hover { background: var(--accent-hover); }
.copy-btn.copied { background: var(--green); }
.code-block { background: var(--code-bg); color: var(--code-fg); font-family: "Menlo", monospace; font-size: 12px; line-height: 1.7; padding: 12px 16px; overflow-x: auto; white-space: pre; margin: 0; }

/* 跨项目提醒横幅 */
.reuse-hint {
  margin-bottom: 14px; padding: 14px 16px;
  background: linear-gradient(135deg, #fff1e6, #ffe4cf);
  border: 1.5px solid var(--accent); border-radius: 12px;
  box-shadow: 0 4px 14px -6px rgba(224,98,58,0.4);
}
.reuse-hint-title { font-size: 13.5px; font-weight: 800; color: var(--accent); margin-bottom: 10px; }
.reuse-hint-list { display: flex; flex-direction: column; gap: 6px; }
.reuse-hint-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.reuse-hint-name { font-weight: 700; color: var(--ink); }
.reuse-hint-from { font-size: 11px; color: var(--muted); background: rgba(255,255,255,0.6); padding: 1px 8px; border-radius: 999px; }

/* ── 人设页 ── */
.persona-bar {
  padding: 13px 16px; background: linear-gradient(135deg, #0c1929, #16273f);
  border-radius: 12px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  color: #f3ece0; margin-bottom: 14px;
}
.persona-bar .ic { color: #e8a84a; }
.persona-headline { font-weight: 700; color: #e8a84a; font-size: 13.5px; }
.persona-skills { font-size: 12px; color: #aebccd; border-left: 1px solid rgba(255,255,255,.18); padding-left: 12px; }
.industry-hero { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.industry-label { font-family: Georgia, "Songti SC", serif; font-size: 24px; font-weight: 700; }
.industry-name { color: var(--accent); }
.confidence-badge { background: var(--pill); border: 1px solid var(--border); border-radius: 20px; padding: 3px 12px; font-size: 12px; color: var(--muted-strong); font-weight: 600; }
.evidence-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip { background: var(--accent); color: #fff; border-radius: 20px; padding: 3px 11px; font-size: 12px; font-family: "Menlo", monospace; }
.meta-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.meta-item { background: var(--pill); border-radius: 10px; padding: 10px 14px; }
.meta-item-label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
.meta-item-value { font-size: 13px; font-weight: 600; }
.redlines-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.redline-item { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; padding: 8px 12px; background: #fdf1f1; border: 1px solid #f6cfcf; border-radius: 9px; }
.redline-item .ic { color: var(--red); flex-shrink: 0; margin-top: 1px; }
.redline-icon { flex-shrink: 0; font-size: 13px; margin-top: 1px; }
.stage-box { margin-top: 14px; padding: 14px 16px; background: linear-gradient(135deg, #fff6ee, #fdeee2); border: 1px solid #f0d4c0; border-radius: 12px; }
.stage-title { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 800; color: var(--accent); margin-bottom: 9px; }
.stage-row { font-size: 13px; line-height: 1.6; margin: 5px 0; }
.stage-row b { display: inline-block; min-width: 52px; color: var(--accent); font-weight: 700; margin-right: 6px; }
.edit-profile-btn {
  background: var(--pill); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 7px 16px; font-size: 12px; color: var(--muted);
  cursor: pointer; font-family: inherit; font-weight: 500; margin-top: 10px;
  transition: border-color 0.15s, color 0.15s;
}
.edit-profile-btn:hover { border-color: var(--accent); color: var(--accent); }
.industry-edit-input {
  border: 1.5px solid var(--accent); border-radius: 6px; padding: 4px 10px;
  font-family: Georgia, "Songti SC", serif; font-size: 24px; font-weight: 700;
  color: var(--accent); background: var(--card); outline: none; width: 180px;
}

/* ── 行业映射页 ── */
.mp-intro {
  font-size: 13px; color: var(--muted-strong); line-height: 1.65;
  margin-bottom: 20px; padding: 12px 14px;
  background: linear-gradient(135deg, #fff6ee, #fdeee2);
  border: 1px solid #f0d4c0; border-radius: 11px;
}
.mp-intro b { color: var(--accent); }
.mp-timeline { position: relative; display: flex; flex-direction: column; gap: 0; }
.mp-step { display: grid; grid-template-columns: 34px 1fr; gap: 4px; opacity: 0; transform: translateY(12px); transition: opacity 0.5s ease, transform 0.5s ease; }
.mp-step.active { opacity: 1; transform: none; }
.mp-node { display: flex; flex-direction: column; align-items: center; padding-top: 4px; }
.mp-dot { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-soft); border: 1.5px solid var(--accent); color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: Georgia, serif; z-index: 2; flex-shrink: 0; }
.mp-line { flex: 1; width: 2px; background: var(--border); margin-top: 3px; }
.mp-body { padding: 1px 0 20px 6px; }
.mp-industry { font-family: Georgia, "Songti SC", serif; font-size: 16px; font-weight: 700; margin-bottom: 3px; }
.mp-role { font-size: 13px; color: var(--muted-strong); margin-bottom: 10px; }
.mp-codecard { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 9px 12px; background: var(--pill); border: 1px solid var(--border); border-radius: 9px; }
.mp-arrow { font-size: 11px; color: var(--muted); }
.mp-codename { font-family: "Menlo", monospace; font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 2px 9px; }
.mp-files { display: flex; flex-wrap: wrap; gap: 6px; flex-basis: 100%; margin-top: 3px; }
.mp-file { font-family: "Menlo", monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
.mp-file .ic { color: var(--muted); }

/* ─────────── 响应式：窄窗（<= 720px）─────────── */
@media (max-width: 720px) {
  .sidebar { width: 220px; }
  .brand-title { font-size: 14px; }
  .proj-name { font-size: 11.5px; }
  .proj-dir { font-size: 9.5px; }
  .nav-label { font-size: 12px; }
  .main-title { font-size: 18px; }
  .main-body { padding: 16px 18px 32px; }
  .main-header { padding: 16px 18px 12px; }
  .score-top { grid-template-columns: 1fr; }
  .avg-num { font-size: 44px; }
}

@media (max-width: 600px) {
  .sidebar { width: 190px; }
  .brand-sub { display: none; }
  .proj-dir { display: none; }
  .nav-badge { display: none; }
  .main-desc { display: none; }
  .pet-foot { display: none; }
}

/* port-input 隐藏 */
#port-input { display: none; }
</style>
</head>
<body>

<!-- ════════ 线性 icon 符号库（统一描边风） ════════ -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- 品牌：爪印 -->
    <symbol id="i-paw" viewBox="0 0 24 24">
      <ellipse cx="12" cy="15" rx="4.2" ry="3.4"/>
      <circle cx="6.5" cy="9.5" r="1.7"/><circle cx="10" cy="6.5" r="1.7"/>
      <circle cx="14" cy="6.5" r="1.7"/><circle cx="17.5" cy="9.5" r="1.7"/>
    </symbol>
    <!-- 项目评分：柱状图 -->
    <symbol id="i-chart" viewBox="0 0 24 24">
      <path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>

    <!-- 公共模块：可复用方块 -->

      <rect x="13" y="13" width="8" height="8" rx="1.5"/>

      <path d="M14 3v5h5"/>

    <!-- 对勾 -->
    <symbol id="i-check" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></symbol>
    <!-- 警告 -->
    <symbol id="i-warn" viewBox="0 0 24 24"><path d="M12 3l9 16H3z"/><path d="M12 10v4M12 17.5v.5"/></symbol>
    <!-- 复制 -->
    <symbol id="i-copy" viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h8"/></symbol>
    <!-- 右箭头 -->
    <symbol id="i-chevron" viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></symbol>
    <!-- 书本（阶段） -->
    <symbol id="i-book" viewBox="0 0 24 24"><path d="M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z"/><path d="M4 17h14"/></symbol>
    <!-- 大脑 -->
    <symbol id="i-brain" viewBox="0 0 24 24"><path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5.5A3 3 0 0 0 8 18a2.5 2.5 0 0 0 4 0V4.5A2.5 2.5 0 0 0 9 4zM15 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5.5A3 3 0 0 1 16 18"/></symbol>
    <!-- 点（idle状态） -->
    <symbol id="i-dot" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/></symbol>
    <!-- 叉（error状态） -->
    <symbol id="i-x" viewBox="0 0 24 24"><path d="M6 6l12 12M18 6L6 18"/></symbol>

</svg>

<div class="app">
  <!-- ════════ 左侧栏 ════════ -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-logo"><img src="assets/coda-mascot.png" alt="小哒 Coda"></span>
      <div>
        <div class="brand-title">小哒 Coda</div>
        <div class="brand-sub">代码体检 · 行业翻译</div>
      </div>
    </div>

    <div class="sidebar-scroll">
      <div class="side-label">项目</div>
      <div class="proj-actions">
        <button id="pick-btn" class="btn btn-pick"><svg class="ic ic-sm"><use href="#i-folder"/></svg>选目录</button>
        <button id="scan-btn" class="btn btn-scan"><svg class="ic ic-sm"><use href="#i-scan"/></svg>扫全部</button>
      </div>

      <!-- 隐藏的输入框，保留旧版功能（手动粘贴路径） -->

      <!-- 拖拽区 + 项目列表 -->

      <div class="side-label">功能</div>
      <nav class="nav">

<script>
// ══════════════════════════════════════════════════════
// 后端配置（改这几行即可切换连本地 / 连云端）
// ══════════════════════════════════════════════════════
// 默认连本地后端（demo 主力：现场起 python server.py，扫本机真实项目，gpt-5.5 飞快）
var CODA_LOCAL_API   = 'http://127.0.0.1:8848';
// 云端后端地址（提交物公网链接 / 评委自助用；带 ?apiBase=cloud 可一键切到这里）
// 主力：自建香港服务器（systemd 常驻 + Caddy HTTPS，不休眠不回收）
var CODA_CLOUD_API   = 'https://coda.chengbei.org';
// 备份：Render 免费实例（会休眠）。要切回就注释上面、解开下面这行：
// var CODA_CLOUD_API   = 'https://code-agent-sdoy.onrender.com';
// 访问令牌（本地和云端后端都开了护栏，要和后端 CODA_ACCESS_TOKEN 一致）
var CODA_ACCESS_TOKEN = 'coda-8618e57cb9f37501';
// ══════════════════════════════════════════════════════

// ── 统一后端地址入口 ──
// 优先级：运行时覆盖 > ?apiBase= query > ?apiBase=cloud 切云端 > ?port= query > 本地默认
var _apiBaseOverride = ''; // 由 window.codaScan / initFromQuery 在运行时写入
function getApiBase() {
  if (_apiBaseOverride) return _apiBaseOverride;
  try {
    var params = new URLSearchParams(window.location.search);
    var apiBaseParam = params.get('apiBase');
    if (apiBaseParam === 'cloud') return CODA_CLOUD_API;       // ?apiBase=cloud → 一键切云端
    if (apiBaseParam) return apiBaseParam.replace(/\/+$/, ''); // ?apiBase=http://… → 自定义
    var portParam = params.get('port');
    if (portParam) return 'http://127.0.0.1:' + portParam;     // ?port=8849 → 换本地端口
  } catch (e) { /* URL API 异常时静默跳过 */ }
  return CODA_LOCAL_API;                                       // 默认：本地 8848
}

// ── 带可选 token 的 headers 构建（保留原有 Content-Type）──
function buildHeaders(extra) {
  var h = Object.assign({}, extra || {});
  if (CODA_ACCESS_TOKEN) h['x-coda-token'] = CODA_ACCESS_TOKEN;
  return h;
}

// ── 全局状态（多项目：选一个看一个）──
var _currentIndustry = '';   // 当前行业（可被用户手改）
var _scanResult     = null;  // 当前选中项目的扫描结果
var _projects       = [];    // [{ root, name, status:'idle'|'scanning'|'done'|'error', result, error }]
var _activeRoot     = null;  // 当前选中项目的 root

// ── 工具函数 ──
function el(id) { return document.getElementById(id); }

function baseName(p) {
  if (!p) return '';
  var parts = String(p).replace(/[\/\\]+$/, '').split(/[\/\\]/);
  return parts[parts.length - 1] || p;
}

function getPort() {
  return (el('port-input') && el('port-input').value) || '8848';
}

function findProject(root) {
  for (var i = 0; i < _projects.length; i++) {
    if (_projects[i].root === root) return _projects[i];
  }
  return null;
}

function setStatus(msg, type) {
  var s = el('status-line');
  s.className = 'status-line' + (type ? ' ' + type : '');
  s.innerHTML = msg;
}

function scoreClass(score) {
  if (score >= 80) return 'green';
  if (score >= 60) return 'orange';
  return 'red';
}

function scoreColor(score) {
  if (score >= 80) return '#2d7a3a';
  if (score >= 60) return '#c96a10';
  return '#be2c2c';
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── 更新功能菜单徽章 ──
function updateBadges() {
  var reviews = _scanResult && _scanResult.reviews;
  var reuse   = _scanResult && _scanResult.reuse;
  var mapping = _scanResult && _scanResult.mapping;

  // 评分徽章 = 平均分
  var badgeReviews = el('badge-reviews');
  if (badgeReviews) {
    if (reviews && reviews.length) {
      var avg = Math.round(reviews.reduce(function(s, r) { return s + (r.score || 0); }, 0) / reviews.length);
      badgeReviews.textContent = avg;
      badgeReviews.style.display = '';
    } else {
      badgeReviews.textContent = '';
      badgeReviews.style.display = 'none';
    }
  }

  // 公共模块徽章 = candidates 数
  var badgeReuse = el('badge-reuse');
  if (badgeReuse) {
    var candidates = reuse && reuse.candidates;
    if (candidates && candidates.length) {
      badgeReuse.textContent = candidates.length;
      badgeReuse.style.display = '';
    } else {
      badgeReuse.textContent = '';
      badgeReuse.style.display = 'none';
    }
  }

  // 行业映射徽章 = concepts 数
  var badgeMapping = el('badge-mapping');
  if (badgeMapping) {
    var concepts = mapping && mapping.concepts;
    if (concepts && concepts.length) {
      badgeMapping.textContent = concepts.length;
      badgeMapping.style.display = '';
    } else {
      badgeMapping.textContent = '';
      badgeMapping.style.display = 'none';
    }
  }
}

// ── 右侧标题元数据 ──
var NAV_META = {
  reviews: { ic: '#i-chart',   title: '项目评分', desc: '跑分 + 得分 · 选一个项目并扫描后查看' },
  reuse:   { ic: '#i-reuse',   title: '公共模块', desc: '可复用轮子 · 跨项目沉淀' },
  profile: { ic: '#i-persona', title: '人设跟随', desc: '行业画像 · 越用越准' },
  mapping: { ic: '#i-map',     title: '行业映射', desc: '代码 ↔ 你那行的话' }
};

function updateMainHeader(key) {
  var m = NAV_META[key];
  if (!m) return;
  var useEl = el('mt-use');
  var titleEl = el('mt-title');
  var descEl = el('mt-desc');
  if (useEl) useEl.setAttribute('href', m.ic);
  if (titleEl) titleEl.textContent = m.title;
  if (descEl) {
    var projectName = _activeRoot ? baseName(_activeRoot) : '';
    var desc = m.desc;
    if (projectName && key === 'reviews') {
      desc = '跑分 + 得分 · ' + projectName;
    }
    descEl.textContent = desc;
  }
}

// ── 左侧 nav 切换 ──
document.querySelectorAll('.nav-item').forEach(function(item) {
  item.addEventListener('click', function() {
    var key = item.getAttribute('data-panel');
    document.querySelectorAll('.nav-item').forEach(function(n) { n.classList.remove('active'); });
    item.classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
    var panel = el('panel-' + key);
    if (panel) panel.classList.add('active');
    updateMainHeader(key);
  });
});

// ── 渲染 ① 人设与行业 ──
function renderProfile(profile) {
  if (!profile) {
    el('profile-content').innerHTML = '<div class="placeholder">暂无画像数据</div>';
    return;
  }

  _currentIndustry = profile.industry || '未知';

  var confidence = profile.confidence != null
    ? Math.round(profile.confidence * 100) + '%'
    : '--';

  var evidenceHtml = '';
  if (profile.evidence && profile.evidence.length) {
    evidenceHtml = '<div class="evidence-chips">'
      + profile.evidence.map(function(e) {
          return '<span class="chip">' + escHtml(e) + '</span>';
        }).join('')
      + '</div>';
  }

  var metaHtml = '';
  if (profile.subDomain || profile.roleGuess) {
    metaHtml = '<div class="meta-row">';
    if (profile.subDomain) {
      metaHtml += '<div class="meta-item">'
        + '<div class="meta-item-label">细分领域</div>'
        + '<div class="meta-item-value">' + escHtml(profile.subDomain) + '</div>'
        + '</div>';
    }
    if (profile.roleGuess) {
      metaHtml += '<div class="meta-item">'
        + '<div class="meta-item-label">角色画像</div>'
        + '<div class="meta-item-value">' + escHtml(profile.roleGuess) + '</div>'
        + '</div>';
    }
    metaHtml += '</div>';
  }

  var redlinesHtml = '';
  if (profile.redlines && profile.redlines.length) {
    redlinesHtml = '<div class="redlines-list">'
      + profile.redlines.map(function(r) {
          return '<div class="redline-item">'
            + '<svg class="ic ic-sm"><use href="#i-warn"/></svg>'
            + '<span>' + escHtml(r) + '</span>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  el('profile-content').innerHTML =
    '<div class="industry-hero">'
      + '<span class="industry-label">我猜你是做【<span class="industry-name" id="industry-display">'
        + escHtml(_currentIndustry) + '</span>】的</span>'
      + '<span class="confidence-badge">置信度 ' + confidence + '</span>'
    + '</div>'
    + evidenceHtml
    + metaHtml
    + redlinesHtml
    + renderStageHtml()
    + '<button class="edit-profile-btn" onclick="toggleEditIndustry()">编辑画像</button>';
}

// ── ②解释：用行业语言讲「现在这个项目在干什么阶段」──
function renderStageHtml() {
  var stage = _scanResult && _scanResult.stage;
  if (!stage || (!stage.stage && !stage.analogy)) return '';
  var html = '<div class="stage-box">'
    + '<div class="stage-title"><svg class="ic ic-sm"><use href="#i-book"/></svg>现在在干什么（用你那行的话讲）</div>';
  if (stage.stage)   html += '<div class="stage-row"><b>阶段</b>' + escHtml(stage.stage) + '</div>';
  if (stage.analogy) html += '<div class="stage-row"><b>相当于</b>' + escHtml(stage.analogy) + '</div>';
  if (stage.next)    html += '<div class="stage-row"><b>下一步</b>' + escHtml(stage.next) + '</div>';
  html += '</div>';
  return html;
}

// ── 编辑行业名（最简实现，不持久化） ──
function toggleEditIndustry() {
  var display = el('industry-display');
  if (!display) return;

  if (display.tagName === 'SPAN') {
    // 切换为输入框
    var val = display.textContent;
    var input = document.createElement('input');
    input.className = 'industry-edit-input';
    input.value = val;
    input.id = 'industry-display';
    input.onblur = function() { saveIndustry(input.value); };
    input.onkeydown = function(e) {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { saveIndustry(_currentIndustry); }
    };
    display.parentNode.replaceChild(input, display);
    input.focus();
    input.select();
  } else {
    saveIndustry(display.value);
  }
}

function saveIndustry(val) {
  var newVal = (val || _currentIndustry || '').trim() || _currentIndustry;
  var changed = newVal !== _currentIndustry;
  _currentIndustry = newVal;
  var display = el('industry-display');
  if (display) {
    var span = document.createElement('span');
    span.className = 'industry-name';
    span.id = 'industry-display';
    span.textContent = _currentIndustry;
    if (display.parentNode) display.parentNode.replaceChild(span, display);
  }
  if (changed) persistProfileOverride();
}

// ── 把手改的画像持久化到评价 Agent（人设跟随：改一次，记一辈子）──
function persistProfileOverride() {
  var root = _activeRoot;
  if (!root) return;
  var override = { industry: _currentIndustry };
  // 行业改了，红线也跟着换成该行业的（让评价跟着走）——交给后端按行业补默认红线，
  // 这里只传 industry；若将来支持手编红线，再带上 redlines。
  fetch(getApiBase() + '/profile/override', {
    method: 'POST',
    headers: buildHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ root: root, override: override, editedAt: new Date().toISOString() })
  })
  .then(function(res) { return res.json(); })
  .then(function(d) {
    if (d && d.ok) {
      setStatus('✓ 画像已保存，下次扫这个目录就按「' + escHtml(_currentIndustry) + '」走', 'success');
    } else {
      setStatus('画像保存失败：' + ((d && d.error) || '未知错误'), 'error');
    }
  })
  .catch(function() {
    setStatus('画像保存失败：评价服务没连上', 'error');
  });
}

// ── ③复用·跨项目提醒横幅（你做过类似的，有现成轮子）──
function renderReuseHintHtml() {
  var hint = _scanResult && _scanResult.reuseHint;
  if (!hint || !hint.candidates || !hint.candidates.length) return '';
  var html = '<div class="reuse-hint">'
    + '<div class="reuse-hint-title">💡 ' + escHtml(hint.message || '你做过类似的项目，有现成轮子可用') + '</div>'
    + '<div class="reuse-hint-list">';
  hint.candidates.forEach(function(c) {
    html += '<div class="reuse-hint-item">'
      + '<span class="reuse-hint-name">' + escHtml(c.name || '') + '</span>'
      + '<span class="reuse-hint-from">来自 ' + escHtml(c.fromProject || '') + '</span>'
      + '</div>';
  });
  html += '</div></div>';
  return html;
}

// ── 渲染 ② 公共模块 ──
function renderReuse(reuse) {
  var hintHtml = renderReuseHintHtml();
  var candidates = reuse && reuse.candidates;
  if (!candidates || !candidates.length) {
    el('reuse-content').innerHTML = hintHtml
      || '<div class="placeholder">扫描后这里会列出可复用的公共模块</div>';
    return;
  }

  var html = hintHtml + '<div class="reuse-list">';
  candidates.forEach(function(item, idx) {
    var snippetId = 'snippet-' + idx;
    html += '<div class="reuse-item">'
      + '<div class="reuse-head">'
        + '<span class="reuse-ic"><svg class="ic ic-sm"><use href="#i-reuse"/></svg></span>'
        + '<span class="reuse-name">' + escHtml(item.name || '未命名') + '</span>'
        + '<span class="reuse-from">来自 ' + escHtml(item.fromProject || '—') + '</span>'
        + '<button class="copy-btn" onclick="copySnippet(' + idx + ', this)"'
          + ' data-snippet-idx="' + idx + '"><svg class="ic ic-sm"><use href="#i-copy"/></svg>复制</button>'
      + '</div>';

    if (item.snippet) {
      html += '<pre class="code-block" id="' + snippetId + '">'
        + escHtml(item.snippet)
        + '</pre>';
    }
    html += '</div>';
  });
  html += '</div>';
  el('reuse-content').innerHTML = html;

  // 存 snippet 到全局，供复制用
  window._reuseSnippets = candidates.map(function(c) { return c.snippet || ''; });
}

function copySnippet(idx, btn) {
  var snippets = window._reuseSnippets || [];
  var text = snippets[idx] || '';
  if (!text) return;
  navigator.clipboard.writeText(text).then(function() {
    var orig = btn.textContent;
    btn.textContent = '已复制✓';
    btn.classList.add('copied');
    setTimeout(function() {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 1800);
  }).catch(function() {
    // 降级：选中 pre 块
    var pre = el('snippet-' + idx);
    if (pre) {
      var sel = window.getSelection();
      var range = document.createRange();
      range.selectNodeContents(pre);
      sel.removeAllRanges();
      sel.addRange(range);
    }
  });
}

// 给代码文件配「行业人话名」——复用行业映射卡的 concepts（数据打通，不额外调 LLM）
function industryNameForFile(filePath) {
  var concepts = _scanResult && _scanResult.mapping && _scanResult.mapping.concepts;
  if (!concepts || !filePath) return '';
  var base = baseName(filePath);
  for (var i = 0; i < concepts.length; i++) {
    var files = concepts[i].files || [];
    for (var j = 0; j < files.length; j++) {
      // 文件名或路径尾部匹配即认为是同一文件
      if (files[j] && (files[j] === filePath || baseName(files[j]) === base
          || filePath.indexOf(files[j]) >= 0 || files[j].indexOf(filePath) >= 0)) {
        return concepts[i].industryName || '';
      }
    }
  }
  return '';
}

function gradeLabel(score) {
  if (typeof score !== 'number') return '待评';
  if (score >= 90) return '优秀';
  if (score >= 70) return '良好';
  return '需改';
}

// ── 渲染 ① 项目评分（跑分软件式明细：人话名 + 等级 + 折叠态露结论）──
function renderReviews(reviews) {
  if (!reviews || !reviews.length) {
    el('reviews-content').innerHTML = '<div class="placeholder">选一个项目并扫描后，这里会列出各文件跑分与改进建议</div>';
    return;
  }

  var total = reviews.reduce(function(s, r) { return s + (r.score || 0); }, 0);
  var avg = Math.round(total / reviews.length);
  var avgColorStr = scoreColor(avg);
  var avgGrade = gradeLabel(avg);

  // 统计问题分布
  var countGood = 0, countOk = 0, countBad = 0;
  reviews.forEach(function(r) {
    var s = r.score || 0;
    if (s >= 90) countGood++;
    else if (s >= 70) countOk++;
    else countBad++;
  });
  var total3 = reviews.length || 1;
  var pGood = Math.round(countGood / total3 * 100);
  var pOk   = Math.round(countOk   / total3 * 100);
  var pBad  = Math.round(countBad  / total3 * 100);

  var html = '<div class="score-top">'
    + '<div class="avg-hero">'
      + '<div class="avg-num" style="color:' + avgColorStr + '">' + avg + '</div>'
      + '<div>'
        + '<div class="avg-meta-label">平均得分 · ' + avgGrade + '</div>'
        + '<div class="avg-meta-sub">检了 ' + reviews.length + ' 个关键文件</div>'
      + '</div>'
    + '</div>'
    + '<div class="dist-card">'
      + '<div class="dist-title">问题分布</div>'
      + '<div class="dist-row"><span class="dist-tag">优秀</span>'
        + '<span class="dist-bar"><span class="dist-fill" style="width:' + pGood + '%;background:var(--green)"></span></span>'
        + '<span class="dist-n">' + countGood + '</span></div>'
      + '<div class="dist-row"><span class="dist-tag">良好</span>'
        + '<span class="dist-bar"><span class="dist-fill" style="width:' + pOk + '%;background:var(--orange)"></span></span>'
        + '<span class="dist-n">' + countOk + '</span></div>'
      + '<div class="dist-row"><span class="dist-tag">需改</span>'
        + '<span class="dist-bar"><span class="dist-fill" style="width:' + pBad + '%;background:var(--red)"></span></span>'
        + '<span class="dist-n">' + countBad + '</span></div>'
    + '</div>'
  + '</div>'
  + '<div class="score-legend">优秀 90+ · 良好 70-89 · 需改 &lt;70</div>'
  + '<div class="file-list">';

  reviews.forEach(function(r, rIdx) {
    var score = r.score != null ? r.score : '--';
    var cls   = typeof score === 'number' ? scoreClass(score) : 'orange';
    var grade = gradeLabel(typeof score === 'number' ? score : null);
    var issues = r.issues || [];
    var fileId = 'file-issues-' + rIdx;

    // 人话名优先用 review 自带的 nickname，退而求映射概念名，再退文件名
    var nick = r.nickname || industryNameForFile(r.file) || baseName(r.file || '');
    // 折叠态露最重一条问题（按 high>mid>low 取）作为一句结论
    var top = null, rank = { high: 3, mid: 2, low: 1 };
    issues.forEach(function(it) {
      var lv = (it.redlineLevel || 'low').toLowerCase();
      if (!top || (rank[lv] || 1) > (rank[(top.redlineLevel || 'low').toLowerCase()] || 1)) top = it;
    });
    var topLevel = top ? (top.redlineLevel || 'low').toLowerCase() : '';
    if (topLevel !== 'high' && topLevel !== 'mid') topLevel = 'low';

    html += '<div class="file-card">'
      + '<div class="file-head" onclick="toggleFileIssues(' + rIdx + ')">'
        + '<div class="file-main">'
          + '<div class="file-top">'
            + '<span class="file-ic"><svg class="ic ic-sm"><use href="#i-file"/></svg></span>'
            + '<span class="file-nick">' + escHtml(nick) + '</span>'
            + '<span class="score-badge ' + cls + '">' + score
              + (typeof score === 'number' ? '<span class="sb-grade">' + grade + '</span>' : '')
            + '</span>'
            + '<span class="chevron" id="arrow-' + rIdx + '"><svg class="ic ic-sm"><use href="#i-chevron"/></svg></span>'
          + '</div>'
          + '<div class="file-path" title="' + escHtml(r.file || '') + '">' + escHtml(r.file || '未知文件') + '</div>'
          + (top
              ? '<div class="file-summary ' + topLevel + '"><span class="dot ' + topLevel + '"></span>'
                  + escHtml(top.problem || '') + '</div>'
              : '<div class="file-summary ok"><svg class="ic ic-sm"><use href="#i-check"/></svg>没发现明显问题，踏实干活</div>')
        + '</div>'
      + '</div>'
      + '<div class="file-issues" id="' + fileId + '">';

    if (issues.length) {
      issues.forEach(function(issue) {
        var level = (issue.redlineLevel || 'low').toLowerCase();
        if (level !== 'high' && level !== 'mid') level = 'low';
        var levelTxt = { high: '红线', mid: '注意', low: '提示' }[level];

        html += '<div class="issue-item ' + level + '">'
          + '<div class="issue-header">'
            + '<span class="issue-dot ' + level + '"></span>'
            + '<span class="issue-level-tag ' + level + '">' + levelTxt + '</span>'
            + '<span class="issue-problem">' + escHtml(issue.problem || '—') + '</span>'
          + '</div>';

        if (issue.fix) {
          html += '<div class="issue-fix">'
            + '<span class="issue-fix-label">怎么改：</span>'
            + escHtml(issue.fix)
            + '</div>';
        }
        if (issue.techDetail) {
          html += '<div class="issue-tech">技术细节：' + escHtml(issue.techDetail) + '</div>';
        }
        html += '</div>';
      });
    } else {
      html += '<div class="placeholder" style="padding:12px 0">该文件没发现明显问题</div>';
    }

    html += '</div></div>';
  });

  html += '</div>';
  el('reviews-content').innerHTML = html;
}

// 展开/收起文件问题
function toggleFileIssues(idx) {
  var panel = el('file-issues-' + idx);
  var arrow = el('arrow-' + idx);
  if (!panel) return;
  var isOpen = panel.classList.contains('open');
  panel.classList.toggle('open', !isOpen);
  if (arrow) arrow.classList.toggle('open', !isOpen);

// ── 渲染 ④ 行业映射（业务流程时间线：行业概念 → 对应代码，滚动逐步点亮）──
function renderMapping(mapping) {
  var concepts = mapping && mapping.concepts;
  var box = el('mapping-content');
  if (!concepts || !concepts.length) {
    box.innerHTML = mapping && mapping.industry === '未知'
      ? '<div class="placeholder">行业未识别，先在「人设跟随」里确认行业，再来看映射</div>'
      : '<div class="placeholder">扫描后，这里用你那行的话讲清楚：项目里几个关键概念分别在干什么</div>';
    return;
  }

  var industry = mapping.industry || '你这行';
  var intro = '<div class="mp-intro">把这个项目里 <b>' + concepts.length + '</b> 个关键概念，'
    + '按业务发生的先后，翻译成 <b>' + escHtml(industry) + '</b> 的话讲给你听 ——'
    + '看懂它，你就知道这类需求该怎么让 AI 落地。</div>';

  var steps = '<div class="mp-timeline">';
  concepts.forEach(function(c, i) {
    var files = (c.files || []).filter(Boolean);
    var filesHtml = files.length
      ? files.map(function(f) {
          return '<span class="mp-file"><svg class="ic ic-sm"><use href="#i-file"/></svg>' + escHtml(f) + '</span>';
        }).join('')
      : '';
    steps += '<div class="mp-step" data-mp-idx="' + i + '">'
      + '<div class="mp-node"><span class="mp-dot">' + (i + 1) + '</span>'
        + (i < concepts.length - 1 ? '<span class="mp-line"></span>' : '')
      + '</div>'
      + '<div class="mp-body">'
        + '<div class="mp-industry">' + escHtml(c.industryName || '') + '</div>'
        + '<div class="mp-role">' + escHtml(c.role || '') + '</div>'
        + '<div class="mp-codecard">'
          + '<span class="mp-arrow">在代码里就是</span>'
          + '<span class="mp-codename">' + escHtml(c.codeName || '') + '</span>'
          + filesHtml
        + '</div>'
      + '</div>'
    + '</div>';
  });
  steps += '</div>';

  box.innerHTML = intro + steps;

  // 滚动逐步点亮（IntersectionObserver，零依赖）；不支持则全部直接点亮
  var stepEls = box.querySelectorAll('.mp-step');
  if ('IntersectionObserver' in window) {
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(en) {
        if (en.isIntersecting) {
          en.target.classList.add('active');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.3 });
    stepEls.forEach(function(s) { io.observe(s); });
    // 兜底：首屏内的若没触发，下一帧补点亮
    setTimeout(function() {
      stepEls.forEach(function(s) {
        var r = s.getBoundingClientRect();
        if (r.top < window.innerHeight) s.classList.add('active');
      });
    }, 120);
  } else {
    stepEls.forEach(function(s) { s.classList.add('active'); });
  }
}

// ── ④人设跟随：拉取跨项目累积的人设摘要，显示在顶部 ──

// ── 项目列表：增 / 删 / 选 / 渲染 ──
function normRoot(root) {
  // 归一化路径，便于「相同目录」判断：去尾部斜杠
  return String(root || '').trim().replace(/[\/\\]+$/, '');
}

function addProject(root, autoScan) {
  root = normRoot(root);
  if (!root) return;
  if (findProject(root)) {        // 相同目录：合并 = 选中并重新扫描刷新
    selectProject(root);
    if (autoScan) scanProject(root);
    return;
  }
  // 不同目录：新增一行
  _projects.push({ root: root, name: baseName(root), status: 'idle', result: null, error: '' });
  renderProjects();
  selectProject(root);
  if (autoScan) scanProject(root);
}

function removeProject(root) {
  _projects = _projects.filter(function(p) { return p.root !== root; });
  if (_activeRoot === root) {
    _activeRoot = null;
    _scanResult = null;
    if (_projects.length) selectProject(_projects[0].root);
    else clearDetail();
  }
  renderProjects();
}

function selectProject(root) {
  var p = findProject(root);
  if (!p) return;
  _activeRoot = root;
  _scanResult = p.result || null;
  renderProjects();
  if (p.result) {
    renderDetail(p.result);
  } else if (p.status === 'error') {
    clearDetail();
    setStatus('「' + escHtml(p.name) + '」扫描失败：' + escHtml(p.error || '未知错误'), 'error');
  } else {
    clearDetail();
  }
}

// ── renderProjects：渲染到左栏项目区 ──
function renderProjects() {
  var list = el('projects-list');
  var hint = el('dropzone-hint');
  if (!_projects.length) {
    list.innerHTML = '';
    if (hint) hint.style.display = 'block';
    return;
  }
  if (hint) hint.style.display = 'none';

  list.innerHTML = _projects.map(function(p) {
    var statusIcon;
    if (p.status === 'scanning') {
      statusIcon = '<span class="proj-check"><span class="spinner"></span></span>';
    } else if (p.status === 'done') {
      statusIcon = '<span class="proj-check"><svg class="ic ic-sm"><use href="#i-check"/></svg></span>';
    } else if (p.status === 'error') {
      statusIcon = '<span class="proj-check" style="color:var(--red)"><svg class="ic ic-sm"><use href="#i-x"/></svg></span>';
    } else {
      statusIcon = '<span class="proj-check" style="color:var(--muted)"><svg class="ic ic-sm"><use href="#i-dot"/></svg></span>';
    }

    var scoreStr = '';
    if (p.status === 'done' && p.result && p.result.reviews && p.result.reviews.length) {
      var revs = p.result.reviews;
      var avg = Math.round(revs.reduce(function(s, r){ return s + (r.score||0); }, 0) / revs.length);
      scoreStr = '<span class="proj-score" style="color:' + scoreColor(avg) + '">' + avg + '</span>';
    }

    return '<div class="proj-row' + (p.root === _activeRoot ? ' active' : '') + '"'
        + ' onclick="selectProject(' + JSON.stringify(p.root).replace(/"/g, '&quot;') + ')">'
      + '<div class="proj-line1">'
        + statusIcon
        + '<span class="proj-name">' + escHtml(p.name) + '</span>'
        + scoreStr
        + '<button class="proj-remove" title="移除"'
          + ' onclick="event.stopPropagation();removeProject(' + JSON.stringify(p.root).replace(/"/g, '&quot;') + ')">×</button>'
      + '</div>'
      + '<div class="proj-dir" title="' + escHtml(p.root) + '">' + escHtml(p.root) + '</div>'
    + '</div>';
  }).join('');
}

// ── 详情区：渲染 / 清空 ──
function renderDetail(data) {
  _scanResult = data;
  renderReviews(data.reviews || null);
  renderReuse(data.reuse || null);
  renderProfile(data.profile || null);
  renderMapping(data.mapping || null);
  updateBadges();
  // 更新右侧标题中的项目名
  var activeNav = document.querySelector('.nav-item.active');
  if (activeNav) updateMainHeader(activeNav.getAttribute('data-panel'));
}

function clearDetail() {
  el('reviews-content').innerHTML = '<div class="placeholder">选一个项目并扫描后，这里会列出各文件跑分与改进建议</div>';
  el('reuse-content').innerHTML   = '<div class="placeholder">扫描后这里会列出可复用的公共模块</div>';
  el('profile-content').innerHTML = '<div class="placeholder">扫描后这里会显示行业画像推断，越用越准</div>';
  el('mapping-content').innerHTML = '<div class="placeholder">扫描后，这里把项目里的代码文件翻译成你那行的行话</div>';
  // 清空徽章
  ['badge-reviews','badge-reuse','badge-mapping'].forEach(function(id) {
    var b = el(id);
    if (b) { b.textContent = ''; b.style.display = 'none'; }
  });
}

// ── 核心：扫描单个项目（写进它的槽位）──
// ── 核心：流式扫描（两段式，不再一把梭 /scan 黑盒转圈）──
// ① POST /scan/plan：本地秒出画像/复用/待评清单（不调 LLM），立刻渲染，详情区不留空白；
// ② 逐个 POST /review：每回一条就插进 reviews 并重渲染评审区，评审“边出边看”。
// 这样无论后端用多重的模型，用户都先秒见画像，评审逐条冒出来，不会面对一个一两分钟的转圈。
function scanProject(root) {
  var p = findProject(root);
  if (!p) return Promise.resolve();
  p.status = 'scanning';
  p.error = '';
  renderProjects();
  if (root === _activeRoot) setStatus('<span class="spinner"></span> 扫描「' + escHtml(p.name) + '」中…');

  return fetch(getApiBase() + '/scan/plan', {
    method: 'POST',
    headers: buildHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ root: root })
  })
  .then(function(res) {
    if (!res.ok) {
      return res.text().then(function(t) {
        throw new Error('HTTP ' + res.status + '：' + (t || '服务端错误'));
      });
    }
    return res.json();
  })
  .then(function(plan) {
    // 先用 plan 拼出一个完整 result 骨架（reviews 暂空，逐条填充）
    var data = {
      scan_summary: plan.scan_summary || {},
      profile: plan.profile || {},
      reuse: plan.reuse || null,
      reuseHint: plan.reuseHint || null,
      mapping: plan.mapping || { industry: (plan.profile || {}).industry || '未知', concepts: [] },
      stage: plan.stage || null,
      reviews: []
    };
    p.result = data;
    var targets = plan.targets || [];
    var total = plan.reviewCount != null ? plan.reviewCount : targets.length;

    // 画像/复用先渲染出来——这一步是本地算的，秒出。
    if (root === _activeRoot) {
      _scanResult = data;
      renderDetail(data);
    }

    var fc = data.scan_summary && data.scan_summary.fileCount;
    var fcStr = fc != null ? '（' + fc + ' 个文件）' : '';

    // 行业阶段 + 行业映射时间线是 LLM 产物，plan 里没有；秒出画像后并行单拉，
    // 不阻塞评审、回来一个渲染一个。
    if (data.profile && data.profile.industry && data.profile.industry !== '未知') {
      fetch(getApiBase() + '/explain/mapping', {
        method: 'POST', headers: buildHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ root: root, profile: data.profile })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(m){
          if (m && m.mapping) { data.mapping = m.mapping;
            if (root === _activeRoot) renderMapping(data.mapping); }
        }).catch(function(){});
      fetch(getApiBase() + '/explain/stage', {
        method: 'POST', headers: buildHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ root: root, profile: data.profile })
      }).then(function(r){ return r.ok ? r.json() : null; })
        .then(function(s){
          if (s && s.stage) { data.stage = s.stage;
            // stage 由 renderProfile→renderStageHtml 渲染（读 _scanResult.stage）
            if (root === _activeRoot) { _scanResult = data; renderProfile(data.profile); } }
        }).catch(function(){});
    }

    // 没有待评文件（行业未知 / 无业务代码）：到此即完成。
    if (!total) {
      finishScan(p, root, fcStr, true);
      return;
    }

    // 评审并发：每个文件单独评（LLM 单次就十几秒），串行会叠成 N 倍延迟。
    // 改成一次性全发，谁先回来就回填渲染（边出边看），全部 settle 后收尾。
    var done = 0;
    function bumpStatus() {
      if (root === _activeRoot) {
        setStatus('<span class="spinner"></span> AI 逐文件评审「' + escHtml(p.name) + '」… '
          + (done) + '/' + total);
      }
    }
    bumpStatus();
    var jobs = targets.map(function(t) {
      return fetch(getApiBase() + '/review', {
        method: 'POST',
        headers: buildHeaders({ 'Content-Type': 'application/json' }),
        body: JSON.stringify({ profile: data.profile, file: { path: t.file, content: t.content } })
      })
      .then(function(res) { return res.ok ? res.json() : { score: null, issues: [], error: 'HTTP ' + res.status }; })
      .catch(function() { return { score: null, issues: [], error: '评审请求失败' }; })
      .then(function(rv) {
        rv.file = t.file;
        data.reviews.push(rv);
        done++;
        bumpStatus();
        // 当前选中的就是这个项目才重渲染评审区（避免抢用户正在看的别的项目）
        if (root === _activeRoot) {
          _scanResult = data;
          renderReviews(data.reviews);
          renderProjects();
        }
      });
    });
    return Promise.all(jobs).then(function() { finishScan(p, root, fcStr, true); });
  })
  .catch(function(err) {
    p.status = 'error';
    var isNetErr = err instanceof TypeError;
    p.error = isNetErr ? '评价服务没连上' : err.message;
    renderProjects();
    if (root === _activeRoot) {
      if (isNetErr) {
        setStatus(
          '小哒 Coda 后端正在唤醒，请稍候重试（App 内置后端首次启动约需几秒，稍等即可）',
          'error'
        );
      } else {
        setStatus('「' + escHtml(p.name) + '」扫描出错：' + err.message, 'error');
      }
    }
  });
}

// 扫描收尾：置 done、刷新状态栏、拉人设。
function finishScan(p, root, fcStr, ok) {
  p.status = 'done';
  renderProjects();
  if (root === _activeRoot) {
    setStatus('✓ 「' + escHtml(p.name) + '」扫描完成' + fcStr, 'success');
    renderDetail(p.result);
  }
  loadPersona();
}

// ── 扫全部（未扫的逐个扫）──
function scanAll() {
  var pending = _projects.filter(function(p) { return p.status === 'idle' || p.status === 'error'; });
  if (!_projects.length) { setStatus('请先加入项目', 'error'); return; }
  if (!pending.length) {
    // 全扫过了：重扫全部
    pending = _projects.slice();
  }
  // 顺序扫，避免一次性打爆本地服务
  pending.reduce(function(chain, p) {
    return chain.then(function() { return scanProject(p.root); });
  }, Promise.resolve());
}

// ── 外部触发接口（供 Electron 主进程调用） ──
window.codaScan = function(root, port) {
  if (port) {
    el('port-input').value = port;
    _apiBaseOverride = 'http://127.0.0.1:' + port; // 让 getApiBase() 走本地
  }
  addProject(root, true);
};
window.selectProject = selectProject;
window.removeProject = removeProject;

// ── 选项目目录（单选；选一个目录=一个项目=一行，后端自动遍历它下面所有子目录）──
function pickFolder() {
  if (window.codaEvalAPI && typeof window.codaEvalAPI.pickFolder === 'function') {
    window.codaEvalAPI.pickFolder()
      .then(function(dirs) {
        // 主进程返回数组；取第一个（对话框配单选）
        var dir = Array.isArray(dirs) ? dirs[0] : dirs;
        if (!dir) return;
        addProject(dir, true);   // 选完直接扫；相同目录会刷新
      })
      .catch(function() { setStatus('选目录失败，可手动粘贴路径', 'error'); });
  } else {
    setStatus('当前环境不支持选目录，请手动粘贴路径后按回车', 'error');
    var ri = el('root-input');
    if (ri) ri.focus();
  }
}

// ── 事件绑定 ──
el('pick-btn').addEventListener('click', pickFolder);
el('scan-btn').addEventListener('click', scanAll);

// root-input 隐藏但保留 keydown 功能
var rootInput = el('root-input');
if (rootInput) {
  rootInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      var v = rootInput.value.trim();
      if (v) { addProject(v, true); rootInput.value = ''; }
    }
  });
}

// ── 拖拽：把文件夹拖进 dropzone 加入列表 ──
(function initDropzone() {
  var dz = el('dropzone');
  if (!dz) return;
  ['dragenter', 'dragover'].forEach(function(ev) {
    dz.addEventListener(ev, function(e) {
      e.preventDefault(); e.stopPropagation();
      dz.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(function(ev) {
    dz.addEventListener(ev, function(e) {
      e.preventDefault(); e.stopPropagation();
      if (ev === 'dragleave' && dz.contains(e.relatedTarget)) return;
      dz.classList.remove('dragover');
    });
  });
  dz.addEventListener('drop', function(e) {
    var files = e.dataTransfer && e.dataTransfer.files;
    if (!files || !files.length) return;
    var added = 0;
    for (var i = 0; i < files.length; i++) {
      // Electron 下拖入的文件/文件夹带 .path（绝对路径）
      var p = files[i].path;
      if (p) { addProject(p, false); added++; }
    }
    if (added) {
      setStatus('拖入 ' + added + ' 个项目，点「扫全部」或单独点项目扫', 'success');
    } else {
      setStatus('没拿到路径——浏览器里拖拽拿不到绝对路径，请用「加项目」按钮', 'error');
    }
  });
})();

// ── 读取 URL query 参数，自动加入并扫描 ──
(function initFromQuery() {
  try {
    var params = new URLSearchParams(window.location.search);
    var root = params.get('root');
    var port = params.get('port');
    if (port) el('port-input').value = port;
    if (root) {
      // 延一帧确保 DOM 就绪
      setTimeout(function() { addProject(root, true); }, 60);
    }
  } catch (e) {
    // URL API 异常时静默跳过
  }
})();
</script>
